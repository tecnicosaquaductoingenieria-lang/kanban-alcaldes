<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban - Gestión de Alcalá</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.3rem; }
        .tabs { background: #16213e; display: flex; padding: 0 30px; border-bottom: 1px solid #2c3e50; }
        .tab { padding: 15px 25px; cursor: pointer; border-bottom: 3px solid transparent; font-size: 0.95rem; transition: all 0.3s; }
        .tab:hover { background: #1e2a4a; }
        .tab.active { border-color: #e74c3c; background: #1e2a4a; }
        .stats-bar { background: #16213e; padding: 15px 30px; display: flex; gap: 30px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #e74c3c; }
        .stat-label { font-size: 0.8rem; color: #888; }
        .kanban-board { display: flex; gap: 20px; padding: 20px 30px; overflow-x: auto; min-height: calc(100vh - 200px); }
        .column { flex: 0 0 300px; background: #16213e; border-radius: 10px; padding: 15px; max-height: calc(100vh - 250px); overflow-y: auto; }
        .column-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 3px solid; }
        .column-header h2 { font-size: 1rem; text-transform: uppercase; }
        .column-count { background: #1a1a2e; padding: 2px 10px; border-radius: 15px; font-size: 0.85rem; }
        .column-cards { display: flex; flex-direction: column; gap: 10px; }
        .card { background: #1a1a2e; border-radius: 8px; padding: 12px; cursor: grab; border-left: 4px solid; transition: all 0.3s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card-alcalde { font-size: 0.75rem; color: #3498db; margin-bottom: 5px; }
        .card-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
        .card-description { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: #666; }
        .priority { padding: 2px 6px; border-radius: 3px; font-weight: 600; }
        .priority.high { background: #e74c3c; color: white; }
        .priority.medium { background: #f39c12; color: white; }
        .priority.low { background: #27ae60; color: white; }
        .add-card-btn { background: transparent; border: 2px dashed #34495e; color: #666; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; margin-top: 10px; }
        .add-card-btn:hover { border-color: #e74c3c; color: #e74c3c; }
        .column.drag-over { background: #1e2a4a; }
        .alcaldes-view { display: none; padding: 20px 30px; }
        .alcaldes-view.active { display: block; }
        .kanban-view { display: none; }
        .kanban-view.active { display: flex; }
        .alcaldes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .alcalde-card { background: #16213e; border-radius: 10px; padding: 20px; border-left: 4px solid #3498db; }
        .alcalde-nombre { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; }
        .alcalde-empresa { font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        .alcalde-cargo { font-size: 0.85rem; color: #aaa; margin-bottom: 15px; }
        .alcalde-contacto { font-size: 0.85rem; color: #3498db; margin-bottom: 5px; }
        .alcalde-stats { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #2c3e50; }
        .alcalde-stat-value { font-size: 1.3rem; font-weight: bold; color: #e74c3c; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .btn-primary { background: #e74c3c; color: white; }
        .btn-primary:hover { background: #c0392b; }
        .btn-secondary { background: #34495e; color: white; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: #16213e; border-radius: 15px; padding: 30px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { margin-bottom: 20px; color: #e74c3c; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #1a1a2e; border: 1px solid #34495e; border-radius: 5px; color: #fff; font-size: 1rem; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 25px; border-radius: 5px; display: none; z-index: 2000; }
        .toast.show { display: block; }
        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .login-overlay.hidden { display: none; }
        .login-box { background: #16213e; padding: 40px; border-radius: 15px; text-align: center; }
        .login-box h2 { margin-bottom: 20px; color: #e74c3c; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a2e; border: 1px solid #34495e; border-radius: 5px; color: #fff; }
        .login-box button { width: 100%; padding: 12px; background: #e74c3c; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 1rem; }
        .login-box button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 Iniciar Sesión</h2>
            <input type="text" id="loginUser" placeholder="Usuario" value="admin">
            <input type="password" id="loginPass" placeholder="Contraseña" value="admin123">
            <button id="loginBtn">Entrar</button>
            <p style="font-size: 0.8rem; color: #666; margin-top: 15px;">Demo: admin/admin123</p>
        </div>
    </div>

    <div class="header">
        <h1>📋 Kanban - Gestión de Alcalá</h1>
        <div class="header-right">
            <span id="userDisplay"></span>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-view="kanban">📋 Kanban</div>
        <div class="tab" data-view="alcaldes">🏛️ Alcalá</div>
    </div>

    <div class="stats-bar">
        <div><span class="stat-value" id="statTotal">0</span> <span class="stat-label">Total</span></div>
        <div><span class="stat-value" id="statAlcaldes">0</span> <span class="stat-label">Alcaldes</span></div>
    </div>

    <div class="kanban-view active" id="kanbanView">
        <div class="kanban-board" id="kanbanBoard"></div>
    </div>

    <div class="alcaldes-view" id="alcaldesView">
        <div class="alcaldes-grid" id="alcaldesGrid"></div>
    </div>

    <div class="modal-overlay" id="addCardModal">
        <div class="modal">
            <h2>Nueva Tarjeta</h2>
            <form id="addCardForm">
                <input type="hidden" id="addCardColumn">
                <div class="form-group"><label>Título</label><input type="text" id="cardTitle" required></div>
                <div class="form-group"><label>Descripción</label><textarea id="cardDescription"></textarea></div>
                <div class="form-group"><label>Álcalde</label><select id="cardAlcalde"><option value="">-- Sin vincular --</option></select></div>
                <div class="form-group"><label>Prioridad</label><select id="cardPriority"><option value="low">Baja</option><option value="medium" selected>Media</option><option value="high">Alta</option></select></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addCardModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="alcaldeModal">
        <div class="modal">
            <h2 id="alcaldeModalTitle">Nuevo Alcalá</h2>
            <form id="alcaldeForm">
                <input type="hidden" id="alcaldeId">
                <div class="form-group"><label>Nombre</label><input type="text" id="alcaldeNombre" required></div>
                <div class="form-group"><label>Empresa</label><input type="text" id="alcaldeEmpresa"></div>
                <div class="form-group"><label>Cargo</label><input type="text" id="alcaldeCargo"></div>
                <div class="form-group"><label>Email</label><input type="email" id="alcaldeEmail"></div>
                <div class="form-group"><label>Teléfono</label><input type="tel" id="alcaldeTelefono"></div>
                <div class="form-group"><label>Notas</label><textarea id="alcaldeNotas"></textarea></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('alcaldeModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Datos en memoria (para demo sin backend)
        let columnas = [
            { id: 'nuevo', name: 'Nuevo', color: '#3498db' },
            { id: 'en-progreso', name: 'En Progreso', color: '#f39c12' },
            { id: 'pendiente-info', name: 'Pendiente Info', color: '#9b59b6' },
            { id: 'completado', name: 'Completado', color: '#27ae60' },
            { id: 'archivado', name: 'Archivado', color: '#7f8c8d' }
        ];
        let tarjetas = [];
        let alcalde = [
            { id: 'a1', nombre: 'María López', empresa: 'Ayuntamiento de Sevilla', cargo: 'Concejala de Urbanismo', email: 'maria.lopez@ayto-sevilla.es', telefono: '+34 954 000 000', estado: 'activo' },
            { id: 'a2', nombre: 'Carlos Martínez', empresa: 'Diputación de Málaga', cargo: 'Director de Infraestructura', email: 'carlos.martinez@dipmalaga.es', telefono: '+34 952 000 000', estado: 'activo' }
        ];

        // Login
        document.getElementById('loginBtn').addEventListener('click', function() {
            var u = document.getElementById('loginUser').value;
            var p = document.getElementById('loginPass').value;
            if ((u === 'admin' && p === 'admin123') || (u === 'ceo' && p === 'ceo123')) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('userDisplay').textContent = '👤 ' + (u === 'admin' ? 'Administrador' : 'CEO');
                showToast('Bienvenido!');
            } else {
                showToast('Credenciales inválidas', true);
            }
        });

        // Tabs
        document.querySelectorAll('.tab').forEach(function(tab) {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
                document.getElementById('kanbanView').classList.remove('active');
                document.getElementById('alcaldesView').classList.remove('active');
                if (this.dataset.view === 'kanban') {
                    this.classList.add('active');
                    document.getElementById('kanbanView').classList.add('active');
                } else {
                    this.classList.add('active');
                    document.getElementById('alcaldesView').classList.add('active');
                }
            });
        });

        // Render Kanban
        function renderKanban() {
            var board = document.getElementById('kanbanBoard');
            board.innerHTML = '';
            columnas.forEach(function(col) {
                var colCards = tarjetas.filter(function(t) { return t.column_id === col.id; });
                var colDiv = document.createElement('div');
                colDiv.className = 'column';
                colDiv.innerHTML = '<div class="column-header" style="border-color:' + col.color + '"><h2>' + col.name + '</h2><span class="column-count">' + colCards.length + '</span></div><div class="column-cards" data-column="' + col.id + '">' + colCards.map(renderCard).join('') + '<button class="add-card-btn" onclick="openAddCardModal(\'' + col.id + '\')">+ Añadir</button></div>';
                board.appendChild(colDiv);
            });
            initDragDrop();
        }

        function renderCard(card) {
            var aInfo = card.alcalde_id ? alcalde.find(function(a) { return a.id === card.alcalde_id; }) : null;
            return '<div class="card" data-id="' + card.id + '" draggable="true" style="border-color:' + getPC(card.priority) + '">' +
                (aInfo ? '<div class="card-alcalde">🏛️ ' + aInfo.nombre + '</div>' : '') +
                '<div class="card-title">' + card.title + '</div>' +
                '<div class="card-footer"><span class="priority ' + card.priority + '">' + card.priority.toUpperCase() + '</span></div></div>';
        }

        function getPC(p) { return { high: '#e74c3c', medium: '#f39c12', low: '#27ae60' }[p] || '#f39c12'; }

        // Drag & Drop
        function initDragDrop() {
            document.querySelectorAll('.card').forEach(function(card) {
                card.addEventListener('dragstart', function(e) { e.dataTransfer.setData('text/plain', this.dataset.id); this.style.opacity = '0.5'; });
                card.addEventListener('dragend', function() { this.style.opacity = '1'; });
            });
            document.querySelectorAll('.column-cards').forEach(function(col) {
                col.addEventListener('dragover', function(e) { e.preventDefault(); this.style.background = '#1e2a4a'; });
                col.addEventListener('dragleave', function() { this.style.background = ''; });
                col.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.style.background = '';
                    var id = e.dataTransfer.getData('text/plain');
                    var card = tarjetas.find(function(t) { return t.id === id; });
                    if (card) { card.column_id = this.dataset.column; renderKanban(); }
                });
            });
        }

        // Render Alcalá
        function renderAlcaldes() {
            var grid = document.getElementById('alcaldesGrid');
            grid.innerHTML = '';
            alcalde.forEach(function(a) {
                var tCount = tarjetas.filter(function(t) { return t.alcalde_id === a.id; }).length;
                var div = document.createElement('div');
                div.className = 'alcalde-card';
                div.innerHTML = '<div class="alcalde-nombre">' + a.nombre + '</div>' +
                    '<div class="alcalde-empresa">' + a.empresa + '</div>' +
                    '<div class="alcalde-cargo">' + a.cargo + '</div>' +
                    (a.email ? '<div class="alcalde-contacto">📧 ' + a.email + '</div>' : '') +
                    '<div class="alcalde-stats"><span class="alcalde-stat-value">' + tCount + '</span> tarjetas</div>';
                grid.appendChild(div);
            });
            document.getElementById('statAlcaldes').textContent = alcalde.length;
        }

        // Modals
        function openAddCardModal(colId) {
            document.getElementById('addCardColumn').value = colId;
            document.getElementById('addCardForm').reset();
            var s = document.getElementById('cardAlcalde');
            s.innerHTML = '<option value="">-- Sin vincular --</option>';
            alcalde.forEach(function(a) { s.innerHTML += '<option value="' + a.id + '">' + a.nombre + '</option>'; });
            document.getElementById('addCardModal').classList.add('active');
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Forms
        document.getElementById('addCardForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var card = {
                id: 'c' + Date.now(),
                title: document.getElementById('cardTitle').value,
                description: document.getElementById('cardDescription').value,
                column_id: document.getElementById('addCardColumn').value,
                priority: document.getElementById('cardPriority').value,
                alcalde_id: document.getElementById('cardAlcalde').value || null
            };
            tarjetas.push(card);
            closeModal('addCardModal');
            renderKanban();
            showToast('Tarjeta creada');
        });

        // Toast
        function showToast(msg, isError) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#e74c3c' : '#27ae60';
            t.classList.add('show');
            setTimeout(function() { t.classList.remove('show'); }, 3000);
        }

        // Init
        renderKanban();
        renderAlcaldes();
    </script>
</body>
</html>
