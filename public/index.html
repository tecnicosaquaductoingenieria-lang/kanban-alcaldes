<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquaducto - Gestión de Contactos y Tareas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007cc3;
            --primary-dark: #005a8f;
            --secondary: #00d084;
            --bg-dark: #1a1a2e;
            --bg-card: #242442;
            --bg-header: linear-gradient(135deg, #007cc3 0%, #005a8f 100%);
            --text: #ffffff;
            --text-muted: #8b8ba7;
            --border: #2d2d5a;
            --success: #00d084;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #8b5cf6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; }

        .header { background: var(--bg-header); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,124,195,0.3); }
        .logo { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo svg { width: 32px; height: 32px; }
        .user-badge { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; }
        .connection-status { font-size: 0.7rem; padding: 4px 8px; border-radius: 10px; margin-right: 10px; }
        .connection-status.ok { background: var(--success); }
        .connection-status.error { background: var(--danger); }

        .nav-tabs { background: var(--bg-card); display: flex; padding: 0 40px; border-bottom: 1px solid var(--border); }
        .nav-tab { padding: 18px 30px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; color: var(--text-muted); transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-tab.active { color: var(--primary); border-color: var(--primary); }

        .stats-bar { background: var(--bg-card); padding: 20px 40px; display: flex; gap: 40px; border-bottom: 1px solid var(--border); }
        .stat-card { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

        .main-content { padding: 30px 40px; }

        .contactos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        .contacto-card { background: var(--bg-card); border-radius: 16px; padding: 24px; border: 1px solid var(--border); transition: all 0.3s; }
        .contacto-card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 40px rgba(0,124,195,0.15); }
        .contacto-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .contacto-nombre { font-size: 1.2rem; font-weight: 600; }
        .contacto-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
        .contacto-empresa { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 4px; }
        .contacto-cargo { color: var(--secondary); font-size: 0.9rem; margin-bottom: 16px; }
        .contacto-info { display: flex; flex-direction: column; gap: 8px; }
        .contacto-info-item { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 0.9rem; }
        .contacto-info-item svg { width: 16px; height: 16px; color: var(--primary); flex-shrink: 0; }
        .contacto-stats { display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .contacto-stat { text-align: center; flex: 1; }
        .contacto-stat-value { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
        .contacto-stat-label { font-size: 0.75rem; color: var(--text-muted); }
        .contacto-actions { display: flex; gap: 10px; margin-top: 16px; }

        .btn { padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #3d3d6a; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-small { padding: 6px 12px; font-size: 0.8rem; }

        .kanban-board { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; }
        .kanban-column { flex: 0 0 320px; background: var(--bg-card); border-radius: 16px; padding: 20px; max-height: calc(100vh - 300px); overflow-y: auto; }
        .kanban-column-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
        .kanban-column-title { font-weight: 600; font-size: 1rem; }
        .kanban-column-count { background: var(--bg-dark); padding: 4px 10px; border-radius: 10px; font-size: 0.85rem; color: var(--text-muted); }
        .kanban-cards { display: flex; flex-direction: column; gap: 12px; min-height: 200px; }
        .kanban-card { background: var(--bg-dark); border-radius: 10px; padding: 14px; border: 1px solid var(--border); cursor: grab; transition: all 0.2s; }
        .kanban-card:hover { border-color: var(--primary); }
        .kanban-card.dragging { opacity: 0.5; }
        .kanban-card-title { font-weight: 500; margin-bottom: 8px; font-size: 0.95rem; }
        .kanban-card-contacto { font-size: 0.8rem; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .kanban-card-checklist { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .checklist-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        .checklist-item input { accent-color: var(--success); }
        .checklist-item.completed { text-decoration: line-through; opacity: 0.6; }
        .kanban-card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .priority-tag { padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .priority-alta { background: var(--danger); color: white; }
        .priority-media { background: var(--warning); color: white; }
        .priority-baja { background: var(--success); color: white; }
        .kanban-add-btn { width: 100%; padding: 12px; background: transparent; border: 2px dashed var(--border); border-radius: 10px; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; transition: all 0.3s; margin-top: 12px; }
        .kanban-add-btn:hover { border-color: var(--primary); color: var(--primary); }
        .kanban-column.drag-over { background: rgba(0,124,195,0.1); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); border-radius: 20px; padding: 32px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
        .modal h2 { margin-bottom: 24px; color: var(--text); font-size: 1.4rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-actions { display: flex; gap: 12px; margin-top: 28px; }

        .login-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-screen.hidden { display: none; }
        .login-box { background: var(--bg-card); border-radius: 24px; padding: 48px; text-align: center; border: 1px solid var(--border); width: 90%; max-width: 400px; }
        .login-box h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .login-box p { color: var(--text-muted); margin-bottom: 32px; }
        .login-box input { width: 100%; padding: 16px; margin-bottom: 16px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 1rem; text-align: center; }
        .login-box button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .login-box button:hover { background: var(--primary-dark); }
        .login-demo { margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }

        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--success); color: white; padding: 16px 28px; border-radius: 12px; font-weight: 500; display: none; z-index: 3000; box-shadow: 0 10px 40px rgba(0,208,132,0.3); }
        .toast.show { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .view { display: none; }
        .view.active { display: block; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { font-size: 1.3rem; margin-bottom: 10px; color: var(--text); }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>🚰 Aquaducto</h1>
            <p>Gestión de Contactos y Tareas</p>
            <input type="text" id="loginUser" placeholder="Usuario" value="admin">
            <input type="password" id="loginPass" placeholder="Contraseña" value="admin123">
            <button onclick="login()">Iniciar Sesión</button>
            <p class="login-demo">Demo: admin / admin123</p>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
            </svg>
            Aquaducto
        </div>
        <div class="header-right">
            <span class="connection-status" id="connectionStatus">Conectando...</span>
            <span class="user-badge" id="userBadge">👤 Administrador</span>
        </div>
    </div>

    <!-- Nav Tabs -->
    <div class="nav-tabs">
        <div class="nav-tab active" data-view="contactos" onclick="showView('contactos')">👥 Contactos</div>
        <div class="nav-tab" data-view="tareas" onclick="showView('tareas')">📋 Tareas</div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-card"><div class="stat-value" id="statContactos">0</div><div class="stat-label">Contactos</div></div>
        <div class="stat-card"><div class="stat-value" id="statTareas">0</div><div class="stat-label">Tareas Activas</div></div>
        <div class="stat-card"><div class="stat-value" id="statPendientes">0</div><div class="stat-label">Pendientes Info</div></div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Contactos View -->
        <div class="view active" id="contactosView">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="font-size: 1.3rem;">Tus Contactos</h2>
                <button class="btn btn-primary" onclick="openContactoModal()">+ Nuevo Contacto</button>
            </div>
            <div class="contactos-grid" id="contactosGrid"></div>
        </div>

        <!-- Tareas View -->
        <div class="view" id="tareasView">
            <h2 style="font-size: 1.3rem; margin-bottom: 20px;">Tablero de Tareas</h2>
            <div class="kanban-board" id="kanbanBoard"></div>
        </div>
    </div>

    <!-- Modal Contacto -->
    <div class="modal-overlay" id="contactoModal">
        <div class="modal">
            <h2 id="contactoModalTitle">Nuevo Contacto</h2>
            <form id="contactoForm">
                <input type="hidden" id="contactoId">
                <div class="form-group"><label>Nombre completo</label><input type="text" id="contactoNombre" required placeholder="Ej: Juan García"></div>
                <div class="form-group"><label>Empresa</label><input type="text" id="contactoEmpresa" placeholder="Ej: Ayuntamiento de Madrid"></div>
                <div class="form-group"><label>Cargo</label><input type="text" id="contactoCargo" placeholder="Ej: Director de Obras"></div>
                <div class="form-group"><label>Email</label><input type="email" id="contactoEmail" placeholder="Ej: juan@empresa.com"></div>
                <div class="form-group"><label>Teléfono</label><input type="tel" id="contactoTelefono" placeholder="Ej: +34 600 000 000"></div>
                <div class="form-group"><label>Notas</label><textarea id="contactoNotas" placeholder="Notas sobre este contacto..."></textarea></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('contactoModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Tarea -->
    <div class="modal-overlay" id="tareaModal">
        <div class="modal">
            <h2 id="tareaModalTitle">Nueva Tarea</h2>
            <form id="tareaForm">
                <input type="hidden" id="tareaColumn">
                <div class="form-group"><label>Título de la tarea</label><input type="text" id="tareaTitulo" required placeholder="Ej: Revisar presupuesto"></div>
                <div class="form-group"><label>Descripción</label><textarea id="tareaDescripcion" placeholder="Detalles de la tarea..."></textarea></div>
                <div class="form-group"><label>Contacto asociado</label><select id="tareaContacto"><option value="">-- Sin asociar --</option></select></div>
                <div class="form-group"><label>Prioridad</label><select id="tareaPrioridad"><option value="baja">Baja</option><option value="media" selected>Media</option><option value="alta">Alta</option></select></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('tareaModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear Tarea</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Ver Tarea -->
    <div class="modal-overlay" id="verTareaModal">
        <div class="modal">
            <h2 id="verTareaTitulo"></h2>
            <p id="verTareaDescripcion" style="color: var(--text-muted); margin-bottom: 20px;"></p>
            <div id="verTareaChecklist"></div>
            <div style="margin-top: 20px;">
                <label style="display: block; margin-bottom: 10px; color: var(--text-muted);">Añadir item al checklist:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="nuevoChecklist" placeholder="Nuevo item..." style="flex: 1;">
                    <button class="btn btn-primary" onclick="addChecklistItem()">Añadir</button>
                </div>
            </div>
            <div class="form-actions" style="margin-top: 24px;">
                <button class="btn btn-secondary" onclick="closeModal('verTareaModal')">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="config.js"></script>
    <script>
        // =====================
        // DATA
        // =====================
        let COLUMNAS = [
            { id: 'nuevo', nombre: 'Nuevo', color: '#007cc3' },
            { id: 'progreso', nombre: 'En Progreso', color: '#f59e0b' },
            { id: 'pendiente', nombre: 'Pendiente Info', color: '#8b5cf6' },
            { id: 'completado', nombre: 'Completado', color: '#00d084' }
        ];

        let contactos = [];
        let tareas = [];
        let checklistData = {};
        let currentVerTareaId = null;

        // =====================
        // INIT
        // =====================
        async function init() {
            // Init Supabase
            const supabaseInit = await initSupabase();
            if (supabaseInit && supabase) {
                document.getElementById('connectionStatus').textContent = 'Supabase ✓';
                document.getElementById('connectionStatus').className = 'connection-status ok';
                await loadData();
            } else {
                document.getElementById('connectionStatus').textContent = 'Modo Demo';
                document.getElementById('connectionStatus').className = 'connection-status error';
                // Demo data
                contactos = [
                    { id: 'demo1', nombre: 'María López', empresa: 'Ayuntamiento de Sevilla', cargo: 'Concejala de Urbanismo', email: 'maria.lopez@ayto-sevilla.es', telefono: '+34 954 000 000' },
                    { id: 'demo2', nombre: 'Carlos Martínez', empresa: 'Diputación de Málaga', cargo: 'Director de Infraestructura', email: 'carlos.martinez@dipmalaga.es', telefono: '+34 952 000 000' }
                ];
                tareas = [
                    { id: 'demo-t1', titulo: 'Revisar presupuesto Sevilla', descripcion: 'Enviar presupuesto detallado', columna_id: 'pendiente', prioridad: 'alta', contacto_id: 'demo1' }
                ];
                checklistData['demo-t1'] = [
                    { id: 'ch1', texto: 'Presupuesto detallado', completado: false },
                    { id: 'ch2', texto: 'Estudio de impacto', completado: false }
                ];
            }
            renderAll();
        }

        async function loadData() {
            if (!supabase) return;
            
            // Load contactos
            const { data: c } = await supabase.from('contactos').select('*').order('created_at', { ascending: false });
            if (c) contactos = c;
            
            // Load tareas
            const { data: t } = await supabase.from('tareas').select('*').order('created_at', { ascending: false });
            if (t) tareas = t;
            
            // Load checklist
            for (const tarea of tareas) {
                const { data: ch } = await supabase.from('checklist').select('*').eq('tarea_id', tarea.id);
                if (ch) checklistData[tarea.id] = ch;
            }
        }

        function renderAll() {
            renderContactos();
            renderKanban();
            updateStats();
        }

        // =====================
        // LOGIN
        // =====================
        function login() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if ((u === 'admin' && p === 'admin123') || (u === 'ceo' && p === 'ceo123')) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('userBadge').textContent = '👤 ' + (u === 'admin' ? 'Administrador' : 'CEO');
                showToast('Bienvenido a Aquaducto');
            } else {
                showToast('Credenciales incorrectas', true);
            }
        }

        // =====================
        // VIEWS
        // =====================
        function showView(view) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelector(`.nav-tab[data-view="${view}"]`).classList.add('active');
            document.getElementById(`${view}View`).classList.add('active');
        }

        // =====================
        // RENDER CONTACTOS
        // =====================
        function renderContactos() {
            const grid = document.getElementById('contactosGrid');
            if (!contactos.length) {
                grid.innerHTML = '<div class="empty-state"><h3>No hay contactos</h3><p>Añade tu primer contacto</p></div>';
                return;
            }
            grid.innerHTML = contactos.map(c => {
                const tareasCount = tareas.filter(t => t.contacto_id === c.id).length;
                return `<div class="contacto-card">
                    <div class="contacto-header">
                        <span class="contacto-nombre">${c.nombre}</span>
                        <span class="contacto-badge">Activo</span>
                    </div>
                    <div class="contacto-empresa">${c.empresa || '-'}</div>
                    <div class="contacto-cargo">${c.cargo || '-'}</div>
                    <div class="contacto-info">
                        ${c.email ? `<div class="contacto-info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>${c.email}</div>` : ''}
                        ${c.telefono ? `<div class="contacto-info-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${c.telefono}</div>` : ''}
                    </div>
                    <div class="contacto-stats">
                        <div class="contacto-stat"><div class="contacto-stat-value">${tareasCount}</div><div class="contacto-stat-label">Tareas</div></div>
                    </div>
                    <div class="contacto-actions">
                        <button class="btn btn-secondary btn-small" onclick="editContacto('${c.id}')">Editar</button>
                        <button class="btn btn-danger btn-small" onclick="deleteContacto('${c.id}')">Eliminar</button>
                    </div>
                </div>`;
            }).join('');
        }

        // =====================
        // RENDER KANBAN
        // =====================
        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = COLUMNAS.map(col => {
                const colTareas = tareas.filter(t => t.columna_id === col.id);
                return `<div class="kanban-column">
                    <div class="kanban-column-header">
                        <span class="kanban-column-title">${col.nombre}</span>
                        <span class="kanban-column-count">${colTareas.length}</span>
                    </div>
                    <div class="kanban-cards" data-column="${col.id}" ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">
                        ${colTareas.map(t => renderTareaCard(t)).join('')}
                    </div>
                    <button class="kanban-add-btn" onclick="openTareaModal('${col.id}')">+ Añadir tarea</button>
                </div>`;
            }).join('');

            // Add drag listeners
            document.querySelectorAll('.kanban-card').forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
            });
        }

        function renderTareaCard(tarea) {
            const contacto = contactos.find(c => c.id === tarea.contacto_id);
            const checklist = checklistData[tarea.id] || [];
            const completedCount = checklist.filter(c => c.completado).length;
            
            return `<div class="kanban-card" draggable="true" data-id="${tarea.id}">
                <div class="kanban-card-title">${tarea.titulo}</div>
                ${contacto ? `<div class="kanban-card-contacto">👤 ${contacto.nombre}</div>` : ''}
                ${checklist.length ? `<div class="kanban-card-checklist">
                    ${checklist.map(c => `<div class="checklist-item ${c.completado ? 'completed' : ''}">
                        <input type="checkbox" ${c.completado ? 'checked' : ''} onchange="toggleChecklist('${tarea.id}', '${c.id}', this.checked)">
                        ${c.texto}
                    </div>`).join('')}
                </div>` : ''}
                <div class="kanban-card-meta">
                    <span class="priority-tag priority-${tarea.prioridad}">${tarea.prioridad.toUpperCase()}</span>
                    <button class="btn btn-secondary btn-small" onclick="verTarea('${tarea.id}')">Ver</button>
                </div>
            </div>`;
        }

        // =====================
        // DRAG & DROP
        // =====================
        let draggedTarea = null;

        function handleDragStart(e) {
            draggedTarea = e.target.dataset.id;
            e.target.classList.add('dragging');
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.parentElement.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.parentElement.classList.remove('drag-over');
        }

        async function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.parentElement.classList.remove('drag-over');
            const newColumn = e.currentTarget.dataset.column;
            if (draggedTarea) {
                const tarea = tareas.find(t => t.id === draggedTarea);
                if (tarea) {
                    tarea.columna_id = newColumn;
                    if (supabase) {
                        await supabase.from('tareas').update({ columna_id: newColumn }).eq('id', draggedTarea);
                    }
                    renderKanban();
                    updateStats();
                }
            }
            draggedTarea = null;
        }

        // =====================
        // CHECKLIST
        // =====================
        async function toggleChecklist(tareaId, checklistId, completado) {
            if (supabase) {
                await supabase.from('checklist').update({ completado }).eq('id', checklistId);
            }
            if (checklistData[tareaId]) {
                const item = checklistData[tareaId].find(c => c.id === checklistId);
                if (item) item.completado = completado;
            }
            renderKanban();
        }

        async function addChecklistItem() {
            const texto = document.getElementById('nuevoChecklist').value.trim();
            if (!texto || !currentVerTareaId) return;

            if (supabase) {
                const { data } = await supabase.from('checklist').insert({ tarea_id: currentVerTareaId, texto, completado: false }).select().single();
                if (data) {
                    if (!checklistData[currentVerTareaId]) checklistData[currentVerTareaId] = [];
                    checklistData[currentVerTareaId].push(data);
                }
            } else {
                const newItem = { id: 'ch-' + Date.now(), texto, completado: false };
                if (!checklistData[currentVerTareaId]) checklistData[currentVerTareaId] = [];
                checklistData[currentVerTareaId].push(newItem);
            }
            document.getElementById('nuevoChecklist').value = '';
            verTarea(currentVerTareaId);
        }

        function verTarea(tareaId) {
            currentVerTareaId = tareaId;
            const tarea = tareas.find(t => t.id === tareaId);
            if (!tarea) return;

            document.getElementById('verTareaTitulo').textContent = tarea.titulo;
            document.getElementById('verTareaDescripcion').textContent = tarea.descripcion || 'Sin descripción';

            const checklist = checklistData[tareaId] || [];
            document.getElementById('verTareaChecklist').innerHTML = checklist.length 
                ? checklist.map(c => `<div class="checklist-item ${c.completado ? 'completed' : ''}">
                    <input type="checkbox" ${c.completado ? 'checked' : ''} onchange="toggleChecklist('${tareaId}', '${c.id}', this.checked)">
                    ${c.texto}
                </div>`).join('')
                : '<p style="color: var(--text-muted);">Sin checklist</p>';

            openModal('verTareaModal');
        }

        // =====================
        // STATS
        // =====================
        function updateStats() {
            document.getElementById('statContactos').textContent = contactos.length;
            document.getElementById('statTareas').textContent = tareas.filter(t => t.columna_id !== 'completado').length;
            document.getElementById('statPendientes').textContent = tareas.filter(t => t.columna_id === 'pendiente').length;
        }

        // =====================
        // MODALS
        // =====================
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function openContactoModal(id) {
            document.getElementById('contactoForm').reset();
            document.getElementById('contactoId').value = '';
            document.getElementById('contactoModalTitle').textContent = 'Nuevo Contacto';
            openModal('contactoModal');
        }

        function editContacto(id) {
            const c = contactos.find(x => x.id === id);
            if (!c) return;
            document.getElementById('contactoId').value = c.id;
            document.getElementById('contactoNombre').value = c.nombre;
            document.getElementById('contactoEmpresa').value = c.empresa || '';
            document.getElementById('contactoCargo').value = c.cargo || '';
            document.getElementById('contactoEmail').value = c.email || '';
            document.getElementById('contactoTelefono').value = c.telefono || '';
            document.getElementById('contactoNotas').value = c.notas || '';
            document.getElementById('contactoModalTitle').textContent = 'Editar Contacto';
            openModal('contactoModal');
        }

        async function deleteContacto(id) {
            if (!confirm('¿Eliminar este contacto?')) return;
            if (supabase) await supabase.from('contactos').delete().eq('id', id);
            contactos = contactos.filter(c => c.id !== id);
            tareas.forEach(t => { if (t.contacto_id === id) t.contacto_id = null; });
            renderAll();
            showToast('Contacto eliminado');
        }

        function openTareaModal(columnId) {
            document.getElementById('tareaForm').reset();
            document.getElementById('tareaColumn').value = columnId;
            document.getElementById('tareaModalTitle').textContent = 'Nueva Tarea';
            const select = document.getElementById('tareaContacto');
            select.innerHTML = '<option value="">-- Sin asociar --</option>' + 
                contactos.map(c => `<option value="${c.id}">${c.nombre} - ${c.empresa}</option>`).join('');
            openModal('tareaModal');
        }

        // =====================
        // FORMS
        // =====================
        document.getElementById('contactoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('contactoId').value;
            const data = {
                nombre: document.getElementById('contactoNombre').value,
                empresa: document.getElementById('contactoEmpresa').value,
                cargo: document.getElementById('contactoCargo').value,
                email: document.getElementById('contactoEmail').value,
                telefono: document.getElementById('contactoTelefono').value,
                notas: document.getElementById('contactoNotas').value
            };
            
            if (id) {
                if (supabase) await supabase.from('contactos').update(data).eq('id', id);
                const idx = contactos.findIndex(c => c.id === id);
                if (idx >= 0) contactos[idx] = { ...contactos[idx], ...data };
                showToast('Contacto actualizado');
            } else {
                if (supabase) {
                    const { data: newData } = await supabase.from('contactos').insert(data).select().single();
                    if (newData) contactos.unshift(newData);
                } else {
                    data.id = 'c' + Date.now();
                    contactos.unshift(data);
                }
                showToast('Contacto creado');
            }
            closeModal('contactoModal');
            renderAll();
        });

        document.getElementById('tareaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const tarea = {
                titulo: document.getElementById('tareaTitulo').value,
                descripcion: document.getElementById('tareaDescripcion').value,
                contacto_id: document.getElementById('tareaContacto').value || null,
                prioridad: document.getElementById('tareaPrioridad').value,
                columna_id: document.getElementById('tareaColumn').value
            };
            
            if (supabase) {
                const { data: newData } = await supabase.from('tareas').insert(tarea).select().single();
                if (newData) {
                    tareas.unshift(newData);
                    checklistData[newData.id] = [];
                }
            } else {
                tarea.id = 't' + Date.now();
                tareas.unshift(tarea);
                checklistData[tarea.id] = [];
            }
            closeModal('tareaModal');
            renderAll();
            showToast('Tarea creada');
        });

        // =====================
        // TOAST
        // =====================
        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#ef4444' : '#00d084';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Init
        init();
    </script>
</body>
</html>
